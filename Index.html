<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jamii \u2016 Sadeshoi</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --primary: #1a6ef5;
    --primary-dark: #0f4fc4;
    --primary-light: #e8f0fe;
    --accent: #ff6b35;
    --bg: #f0f2f5;
    --card: #ffffff;
    --sidebar-bg: #ffffff;
    --text: #1c1e21;
    --text-secondary: #65676b;
    --border: #dde1e7;
    --hover: #f0f2f5;
    --online: #31a24c;
    --story-gradient: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
    --sidebar-w: 280px;
    --right-sidebar-w: 300px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* \u2500\u2500\u2500 AUTH PAGES \u2500\u2500\u2500 */
  .auth-page {
    min-height: 100vh;
    background: linear-gradient(135deg, #0a1628 0%, #1a3a6e 50%, #0d2547 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    position: relative;
    overflow: hidden;
  }
  .auth-page::before {
    content: '';
    position: absolute;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(26,110,245,0.15) 0%, transparent 70%);
    top: -200px; left: -200px;
  }
  .auth-page::after {
    content: '';
    position: absolute;
    width: 500px; height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,107,53,0.1) 0%, transparent 70%);
    bottom: -150px; right: -150px;
  }

  .auth-container {
    display: flex;
    gap: 60px;
    align-items: center;
    max-width: 900px;
    width: 100%;
    z-index: 1;
  }

  .auth-brand {
    flex: 1;
    color: white;
  }
  .auth-brand .logo-text {
    font-family: 'Sora', sans-serif;
    font-size: 52px;
    font-weight: 800;
    color: var(--primary);
    letter-spacing: -2px;
    line-height: 1;
  }
  .auth-brand .tagline {
    font-size: 22px;
    font-weight: 300;
    margin-top: 12px;
    color: rgba(255,255,255,0.8);
    line-height: 1.4;
  }
  .auth-brand .features {
    margin-top: 32px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .feature-item {
    display: flex;
    align-items: center;
    gap: 10px;
    color: rgba(255,255,255,0.7);
    font-size: 15px;
  }
  .feature-item .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--primary);
    flex-shrink: 0;
  }

  .auth-card {
    background: white;
    border-radius: 20px;
    padding: 36px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .auth-card h2 {
    font-family: 'Sora', sans-serif;
    font-size: 26px;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .auth-card .sub {
    color: var(--text-secondary);
    font-size: 14px;
    margin-bottom: 28px;
  }

  .form-group {
    margin-bottom: 16px;
  }
  .form-group label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .form-group input, .form-group select {
    width: 100%;
    padding: 13px 16px;
    border: 2px solid var(--border);
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
    background: #fafafa;
  }
  .form-group input:focus, .form-group select:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 4px rgba(26,110,245,0.1);
    background: white;
  }

  .form-row { display: flex; gap: 12px; }
  .form-row .form-group { flex: 1; }

  .btn-primary {
    width: 100%;
    padding: 14px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 12px;
    font-family: 'Sora', sans-serif;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    margin-top: 8px;
  }
  .btn-primary:hover { background: var(--primary-dark); }
  .btn-primary:active { transform: scale(0.98); }

  .btn-secondary {
    padding: 11px 20px;
    background: transparent;
    color: var(--primary);
    border: 2px solid var(--primary);
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-secondary:hover { background: var(--primary-light); }

  .auth-switch {
    text-align: center;
    margin-top: 20px;
    font-size: 14px;
    color: var(--text-secondary);
  }
  .auth-switch a {
    color: var(--primary);
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
  }
  .auth-switch a:hover { text-decoration: underline; }

  .divider {
    text-align: center;
    position: relative;
    margin: 20px 0;
    color: var(--text-secondary);
    font-size: 13px;
  }
  .divider::before {
    content: '';
    position: absolute;
    top: 50%; left: 0; right: 0;
    height: 1px;
    background: var(--border);
  }
  .divider span {
    background: white;
    padding: 0 12px;
    position: relative;
  }

  /* \u2500\u2500\u2500 MAIN APP \u2500\u2500\u2500 */
  .app { display: none; }
  .app.active { display: block; }
  .auth-page.hidden { display: none; }

  /* \u2500\u2500\u2500 NAVBAR \u2500\u2500\u2500 */
  .navbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 56px;
    background: white;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    z-index: 1000;
    gap: 8px;
  }
  .nav-logo {
    font-family: 'Sora', sans-serif;
    font-size: 24px;
    font-weight: 800;
    color: var(--primary);
    letter-spacing: -1px;
    width: var(--sidebar-w);
    flex-shrink: 0;
  }
  .nav-search {
    flex: 0 0 240px;
    position: relative;
  }
  .nav-search input {
    width: 100%;
    padding: 8px 16px 8px 38px;
    border: none;
    border-radius: 20px;
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    outline: none;
  }
  .nav-search input:focus { background: #e4e6e9; }
  .nav-search .search-icon {
    position: absolute;
    left: 12px; top: 50%;
    transform: translateY(-50%);
    color: var(--text-secondary);
    font-size: 16px;
  }
  .nav-tabs {
    flex: 1;
    display: flex;
    justify-content: center;
    gap: 4px;
  }
  .nav-tab {
    padding: 8px 32px;
    border-radius: 10px;
    cursor: pointer;
    color: var(--text-secondary);
    font-size: 22px;
    transition: all 0.2s;
    position: relative;
  }
  .nav-tab:hover { background: var(--hover); color: var(--primary); }
  .nav-tab.active { color: var(--primary); }
  .nav-tab.active::after {
    content: '';
    position: absolute;
    bottom: -9px; left: 0; right: 0;
    height: 3px;
    background: var(--primary);
    border-radius: 2px 2px 0 0;
  }
  .nav-actions {
    display: flex;
    gap: 8px;
    align-items: center;
    width: var(--right-sidebar-w);
    justify-content: flex-end;
  }
  .nav-btn {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: var(--bg);
    border: none;
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
    position: relative;
  }
  .nav-btn:hover { background: #e4e6e9; }
  .nav-btn .badge {
    position: absolute;
    top: 2px; right: 2px;
    width: 16px; height: 16px;
    background: #e4473c;
    color: white;
    border-radius: 50%;
    font-size: 10px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 2px solid white;
  }
  .nav-avatar {
    width: 40px; height: 40px;
    border-radius: 50%;
    cursor: pointer;
    object-fit: cover;
    border: 2px solid var(--primary);
  }

  /* \u2500\u2500\u2500 LAYOUT \u2500\u2500\u2500 */
  .main-layout {
    display: flex;
    margin-top: 56px;
    min-height: calc(100vh - 56px);
  }

  /* \u2500\u2500\u2500 LEFT SIDEBAR \u2500\u2500\u2500 */
  .left-sidebar {
    position: fixed;
    top: 56px;
    width: var(--sidebar-w);
    height: calc(100vh - 56px);
    overflow-y: auto;
    padding: 8px 12px;
    scrollbar-width: none;
  }
  .left-sidebar::-webkit-scrollbar { display: none; }

  .sidebar-user {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 8px;
    border-radius: 12px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .sidebar-user:hover { background: var(--hover); }
  .sidebar-user img {
    width: 36px; height: 36px;
    border-radius: 50%;
    object-fit: cover;
  }
  .sidebar-user span {
    font-weight: 600;
    font-size: 15px;
  }

  .sidebar-nav { margin-top: 4px; }
  .sidebar-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 8px;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.2s;
    font-size: 15px;
    font-weight: 500;
  }
  .sidebar-item:hover { background: var(--hover); }
  .sidebar-item .icon {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .sidebar-section {
    margin-top: 16px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }
  .sidebar-section-title {
    font-size: 17px;
    font-weight: 700;
    padding: 4px 8px;
    margin-bottom: 4px;
    color: var(--text);
  }

  /* \u2500\u2500\u2500 FEED \u2500\u2500\u2500 */
  .feed-area {
    margin-left: var(--sidebar-w);
    margin-right: var(--right-sidebar-w);
    flex: 1;
    padding: 24px 20px;
    max-width: 680px;
    width: 100%;
    margin-right: auto;
    margin-left: auto;
    margin-top: 0;
    padding-left: calc(var(--sidebar-w) + 20px);
    padding-right: calc(var(--right-sidebar-w) + 20px);
    box-sizing: border-box;
    max-width: 100%;
  }

  /* \u2500\u2500\u2500 STORIES \u2500\u2500\u2500 */
  .stories-row {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 8px;
    margin-bottom: 16px;
    scrollbar-width: none;
  }
  .stories-row::-webkit-scrollbar { display: none; }

  .story-card {
    flex-shrink: 0;
    width: 112px;
    height: 200px;
    border-radius: 14px;
    overflow: hidden;
    cursor: pointer;
    position: relative;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    transition: transform 0.2s;
  }
  .story-card:hover { transform: scale(1.03); }
  .story-card .story-bg {
    width: 100%; height: 100%;
    object-fit: cover;
  }
  .story-card .story-gradient {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 60%;
    background: linear-gradient(transparent, rgba(0,0,0,0.7));
  }
  .story-card .story-name {
    position: absolute;
    bottom: 10px; left: 8px; right: 8px;
    color: white;
    font-size: 13px;
    font-weight: 600;
  }
  .story-card .story-avatar {
    position: absolute;
    top: 10px; left: 10px;
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 3px solid var(--primary);
    object-fit: cover;
  }
  .story-card.add-story {
    background: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    padding-bottom: 14px;
    gap: 6px;
  }
  .story-card.add-story .add-icon-wrap {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: var(--primary);
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 22px;
    font-weight: 300;
    margin-bottom: 4px;
  }
  .story-card.add-story .top-half {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 55%;
    background: var(--bg);
  }
  .story-add-label { font-size: 13px; font-weight: 600; color: var(--text); }

  /* \u2500\u2500\u2500 POST BOX \u2500\u2500\u2500 */
  .post-box {
    background: white;
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 16px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  .post-box-top {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }
  .post-box-top img {
    width: 40px; height: 40px;
    border-radius: 50%;
    object-fit: cover;
  }
  .post-input-area {
    flex: 1;
    padding: 10px 16px;
    border-radius: 20px;
    background: var(--bg);
    color: var(--text-secondary);
    cursor: pointer;
    font-size: 15px;
    transition: background 0.2s;
    border: none;
    outline: none;
    font-family: 'DM Sans', sans-serif;
  }
  .post-input-area:hover { background: #e4e6e9; }
  .post-actions-row {
    display: flex;
    gap: 2px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }
  .post-action-btn {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 8px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    color: var(--text-secondary);
    transition: background 0.2s;
    border: none;
    background: none;
    font-family: 'DM Sans', sans-serif;
  }
  .post-action-btn:hover { background: var(--hover); }

  /* \u2500\u2500\u2500 POST CARD \u2500\u2500\u2500 */
  .post-card {
    background: white;
    border-radius: 14px;
    margin-bottom: 16px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    overflow: hidden;
    animation: fadeIn 0.4s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .post-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 16px 10px;
  }
  .post-header img {
    width: 42px; height: 42px;
    border-radius: 50%;
    object-fit: cover;
  }
  .post-author { flex: 1; }
  .post-author .name {
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
  }
  .post-author .name:hover { text-decoration: underline; }
  .post-author .meta {
    font-size: 13px;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .post-more {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: none;
    border: none;
    cursor: pointer;
    font-size: 20px;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }
  .post-more:hover { background: var(--hover); }

  .post-text {
    padding: 0 16px 12px;
    font-size: 15px;
    line-height: 1.5
