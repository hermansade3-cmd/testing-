<!DOCTYPE html>
<html lang="sw" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SadeHub — Picha & Video</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #f8f7f4;
  --bg2:       #eeede9;
  --card:      #ffffff;
  --text:      #111111;
  --text2:     #666;
  --border:    #e2e0da;
  --accent:    #e8304a;
  --accent2:   #ff0000;
  --nav-bg:    rgba(248,247,244,0.93);
  --input-bg:  #eeede9;
  --tag-bg:    #f0ede8;
  --shadow:    0 2px 16px rgba(0,0,0,0.06);
  --shadow-h:  0 10px 36px rgba(0,0,0,0.13);
  --overlay:   rgba(10,10,10,0.62);
  --yt-red:    #ff0000;
}
[data-theme="dark"] {
  --bg:        #0d0d0d;
  --bg2:       #181818;
  --card:      #1c1c1c;
  --text:      #f0f0f0;
  --text2:     #888;
  --border:    #2a2a2a;
  --accent:    #ff3f57;
  --nav-bg:    rgba(13,13,13,0.96);
  --input-bg:  #222;
  --tag-bg:    #252525;
  --shadow:    0 2px 16px rgba(0,0,0,0.45);
  --shadow-h:  0 10px 36px rgba(0,0,0,0.65);
  --overlay:   rgba(0,0,0,0.72);
}

*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;transition:background .35s,color .35s;min-height:100vh;}

/* ── NAV ─────────────────────────────────── */
nav:not(.bottom-nav){
  position:fixed;top:0;left:0;right:0;z-index:200;
  height:70px;
  background:var(--nav-bg);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:16px;padding:0 24px;
  transition:background .35s,border-color .35s;
}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0;}
.logo-icon{
  width:36px;height:36px;border-radius:10px;
  background:linear-gradient(135deg,#e8304a 0%,#ff7a5c 100%);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 12px rgba(232,48,74,.35);flex-shrink:0;
}
[data-theme="dark"] .logo-icon{box-shadow:0 4px 14px rgba(255,63,87,.4);}
.logo-icon svg{color:#fff;}
.logo-text{display:flex;flex-direction:column;line-height:1;}
.logo-name{
  font-family:'Syne',serif;font-weight:900;font-size:1.25rem;letter-spacing:-1px;
  background:linear-gradient(135deg,#e8304a,#ff7a5c);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.logo-tag{font-size:.6rem;font-weight:500;color:var(--text2);letter-spacing:.5px;text-transform:uppercase;margin-top:1px;}

.search-box{flex:1;max-width:520px;position:relative;}
.search-box svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text2);pointer-events:none;}
/* searchInput styles defined in enhanced section below */

.nav-end{display:flex;align-items:center;gap:12px;margin-left:auto;flex-shrink:0;}
.dm-toggle{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;padding:6px 14px;border-radius:40px;border:1.5px solid var(--border);transition:border-color .2s,background .2s;}
.dm-toggle:hover{border-color:var(--accent);}
.dm-label{font-size:.78rem;font-weight:500;color:var(--text2);white-space:nowrap;}
.track{width:40px;height:20px;background:var(--input-bg);border-radius:40px;border:2px solid var(--border);position:relative;transition:background .3s,border-color .3s;cursor:pointer;flex-shrink:0;}
.track::after{content:'';position:absolute;top:2px;left:2px;width:12px;height:12px;border-radius:50%;background:var(--text2);transition:transform .3s,background .3s;}
[data-theme="dark"] .track{background:var(--accent);border-color:var(--accent);}
[data-theme="dark"] .track::after{transform:translateX(20px);background:#fff;}

/* ── MODE SWITCHER (Picha / Video) ─────── */
.mode-switcher{
  display:flex;gap:4px;
  background:var(--bg2);
  border:1.5px solid var(--border);
  border-radius:40px;
  padding:3px;
}
.mode-btn{
  padding:5px 16px;border-radius:40px;border:none;
  font-family:'Outfit',sans-serif;font-size:.78rem;font-weight:600;
  cursor:pointer;color:var(--text2);background:transparent;
  display:flex;align-items:center;gap:5px;
  transition:all .2s;white-space:nowrap;
}
.mode-btn.active{background:var(--accent);color:#fff;box-shadow:0 2px 10px rgba(232,48,74,.35);}
.mode-btn:hover:not(.active){color:var(--accent);}

/* ── TABS BAR ─────────────────────────── */
.tabs-bar{
  position:fixed;top:70px;left:0;right:0;z-index:190;
  background:var(--bg);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:6px;padding:8px 24px;
  overflow-x:auto;scrollbar-width:none;
  transition:background .35s,border-color .35s;
}
.tabs-bar::-webkit-scrollbar{display:none;}
/* tab styles defined in vibrant section below */

/* ── VIEW SWITCHER ───────────────────── */
.view-btn{background:var(--tag-bg);border:none;color:var(--text2);width:32px;height:32px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .18s,color .18s;}
.view-btn.active,.view-btn:hover{background:var(--accent);color:#fff;}

/* ── MAIN ────────────────────────────── */
main{padding-top:126px;padding-bottom:100px;max-width:1440px;margin:0 auto;padding-left:16px;padding-right:16px;}
.meta-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px;}
.meta-text{font-size:.82rem;color:var(--text2);}
.meta-text strong{color:var(--accent);}
.view-switcher{display:flex;gap:5px;}

/* ── PHOTO LAYOUTS ───────────────────── */
.masonry{columns:5;column-gap:12px;}
@media(max-width:1200px){.masonry{columns:4;}}
@media(max-width:900px){.masonry{columns:3;}}
@media(max-width:600px){.masonry{columns:2;}}
.grid-view{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;}

/* ── PHOTO CARD ──────────────────────── */
.card{break-inside:avoid;margin-bottom:12px;border-radius:16px;overflow:hidden;background:var(--card);box-shadow:var(--shadow);position:relative;cursor:pointer;transition:transform .28s cubic-bezier(.34,1.46,.64,1),box-shadow .28s;animation:popIn .45s ease both;}
.grid-view .card{margin-bottom:0;break-inside:unset;}
.card:hover{transform:translateY(-5px) scale(1.015);box-shadow:var(--shadow-h);}
@keyframes popIn{from{opacity:0;transform:translateY(22px) scale(.97);}to{opacity:1;transform:translateY(0) scale(1);}}
.card-media{position:relative;}
.card img{width:100%;display:block;background:var(--bg2);transition:filter .28s;}
.card:hover img{filter:brightness(.88);}
.card-overlay{position:absolute;inset:0;background:var(--overlay);border-radius:16px;opacity:0;transition:opacity .22s;display:flex;flex-direction:column;justify-content:flex-end;padding:12px;gap:7px;}
.card:hover .card-overlay{opacity:1;}
.overlay-row{display:flex;gap:7px;justify-content:flex-end;}
.ov-btn{padding:6px 14px;border-radius:40px;border:none;font-family:'Outfit',sans-serif;font-size:.76rem;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;transition:transform .18s;}
.ov-btn:hover{transform:scale(1.06);}
.ov-dl{background:var(--accent);color:#fff;}
.ov-open{background:rgba(255,255,255,.18);color:#fff;border:1.5px solid rgba(255,255,255,.35);}
.card-body{padding:9px 11px 11px;background:var(--card);transition:background .35s;}
.card-title{font-size:.8rem;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px;}
.card-sub{font-size:.7rem;color:var(--text2);display:flex;align-items:center;gap:5px;}
.dot{width:4px;height:4px;border-radius:50%;background:var(--text2);flex-shrink:0;}

/* ── VIDEO GRID — see below ─────────── */
#videoSection{display:none;}

/* vcard styles defined below in enhanced section */

/* ── VIDEO LIGHTBOX NAV ──────────────── */
.vlb-top-close{
  position:absolute;top:16px;right:16px;z-index:10;
  width:38px;height:38px;border-radius:50%;
  background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.25);
  color:#fff;font-size:1rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .18s;
}
.vlb-top-close:hover{background:rgba(255,63,87,.7);border-color:transparent;}

.vlb-nav{
  position:absolute;left:50%;transform:translateX(-50%);
  width:48px;height:48px;border-radius:50%;
  background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.2);
  color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .18s,transform .18s;z-index:10;
}
.vlb-nav:hover{background:rgba(232,48,74,.7);border-color:transparent;transform:translateX(-50%) scale(1.08);}
.vlb-nav:disabled{opacity:.25;cursor:default;pointer-events:none;}
.vlb-nav-up{top:12px;}
.vlb-nav-down{bottom:12px;}

.vlb-counter{
  font-size:.75rem;color:rgba(255,255,255,.6);
  font-weight:600;white-space:nowrap;margin-top:2px;
}
.vlb-wrap{
  display:none;position:fixed;inset:0;z-index:500;
  background:rgba(0,0,0,.96);
  align-items:center;justify-content:center;padding:16px;
}
.vlb-wrap.open{display:flex;}
.vlb-inner{
  position:relative;width:100%;max-width:960px;
  animation:lbIn .32s cubic-bezier(.34,1.46,.64,1);
}
@keyframes lbIn{from{opacity:0;transform:scale(.88);}to{opacity:1;transform:scale(1);}}
.vlb-frame-wrap{
  position:relative;width:100%;aspect-ratio:16/9;
  border-radius:14px;overflow:hidden;background:#000;
}
.vlb-frame-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:none;}
.vlb-bar{
  display:flex;align-items:flex-start;justify-content:space-between;gap:12px;
  padding:14px 4px 0;
}
.vlb-info{flex:1;min-width:0;}
.vlb-title{color:#fff;font-size:.95rem;font-weight:600;line-height:1.4;margin-bottom:4px;}
.vlb-channel{color:var(--accent);font-size:.8rem;font-weight:500;}
.vlb-close{
  background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.2);
  color:#fff;padding:8px 18px;border-radius:40px;
  font-family:'Outfit',sans-serif;font-size:.8rem;font-weight:600;
  cursor:pointer;transition:background .18s;white-space:nowrap;flex-shrink:0;
}
.vlb-close:hover{background:rgba(255,63,87,.7);border-color:transparent;}
.vlb-yt-link{
  display:inline-flex;align-items:center;gap:5px;
  background:var(--yt-red);color:#fff;
  padding:7px 16px;border-radius:40px;
  font-size:.78rem;font-weight:600;text-decoration:none;
  transition:opacity .18s;margin-top:8px;
}
.vlb-yt-link:hover{opacity:.85;}

/* ── PHOTO LIGHTBOX ──────────────────── */
.lb-wrap{display:none;position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.94);align-items:center;justify-content:center;padding:16px;}
.lb-wrap.open{display:flex;}
.lb-inner{position:relative;max-width:92vw;max-height:90vh;border-radius:16px;overflow:hidden;animation:lbIn .32s cubic-bezier(.34,1.46,.64,1);}
.lb-inner img{max-width:90vw;max-height:80vh;object-fit:contain;display:block;}
.lb-bar{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.75));padding:20px 16px 14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.lb-title{color:#fff;font-size:.88rem;font-weight:500;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lb-actions{display:flex;gap:7px;flex-shrink:0;}
.lb-btn{padding:7px 17px;border-radius:40px;border:none;font-family:'Outfit',sans-serif;font-size:.78rem;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;transition:transform .18s;}
.lb-btn:hover{transform:scale(1.05);}
.lb-dl{background:var(--accent);color:#fff;}
.lb-close-btn{background:rgba(255,255,255,.15);color:#fff;border:1.5px solid rgba(255,255,255,.3);}
.lb-top-close{position:absolute;top:12px;right:12px;width:34px;height:34px;border-radius:50%;background:rgba(0,0,0,.55);border:none;color:#fff;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .18s;z-index:10;}
.lb-top-close:hover{background:rgba(230,48,74,.8);}

/* ── LOADER ──────────────────────────── */
.loader{text-align:center;padding:40px 0;color:var(--text2);font-size:.85rem;}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .75s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── EMPTY ───────────────────────────── */
.empty{text-align:center;padding:80px 20px;color:var(--text2);display:none;}
.empty h3{font-family:'Syne',sans-serif;font-size:1.3rem;margin:12px 0 6px;color:var(--text);}

/* ── TOAST ───────────────────────────── */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(14px);background:rgba(20,20,20,.95);color:#fff;padding:9px 22px;border-radius:40px;font-size:.82rem;font-weight:500;opacity:0;pointer-events:none;transition:opacity .28s,transform .28s;z-index:600;white-space:nowrap;border:1px solid rgba(255,255,255,.08);backdrop-filter:blur(8px);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── SCROLL TOP ──────────────────────── */
#scrollTop{position:fixed;bottom:80px;right:16px;z-index:99;width:42px;height:42px;border-radius:50%;background:var(--accent);color:#fff;border:none;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 18px rgba(232,48,74,.4);opacity:0;pointer-events:none;transition:opacity .3s,transform .3s;}
#scrollTop.show{opacity:1;pointer-events:all;}
#scrollTop:hover{transform:translateY(-3px);}

/* ── SECTION HEADER ──────────────────── */
.section-header{
  display:flex;align-items:center;gap:10px;
  margin-bottom:18px;padding-bottom:12px;
  border-bottom:1px solid var(--border);
}
.section-header-icon{
  width:32px;height:32px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:1rem;
}
.section-header-icon.yt{background:var(--yt-red);color:#fff;}
.section-header-icon.ph{background:linear-gradient(135deg,#e8304a,#ff7a5c);color:#fff;}
.section-header h2{font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;color:var(--text);}
.section-header span{font-size:.78rem;color:var(--text2);margin-left:auto;}

/* ── BOTTOM NAV BAR (Mobile) ─────────── */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;z-index:300;
  height:64px;
  padding-bottom:env(safe-area-inset-bottom, 0px);
  background:var(--nav-bg);
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  border-top:1px solid var(--border);
  display:flex;align-items:stretch;
  transition:background .35s,border-color .35s;
}
.bn-item{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;cursor:pointer;border:none;background:transparent;
  color:var(--text2);font-family:'Outfit',sans-serif;
  font-size:.6rem;font-weight:600;letter-spacing:.3px;
  text-transform:uppercase;transition:color .18s;
  position:relative;padding:0;
}
.bn-item:hover,.bn-item.active{color:var(--accent);}
.bn-item.active::after{
  content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:28px;height:3px;border-radius:0 0 4px 4px;
  background:var(--accent);
}
.bn-icon{
  width:24px;height:24px;display:flex;align-items:center;justify-content:center;
  transition:transform .18s;
}
.bn-item:hover .bn-icon{transform:scale(1.12);}
.bn-item.active .bn-icon{
  transform:scale(1.18);
  filter:drop-shadow(0 0 6px var(--accent));
}
.bn-label{line-height:1;}

/* ── ENHANCED SEARCH BAR ─────────────── */
#searchInput{
  width:100%;padding:11px 16px 11px 44px;border-radius:40px;
  border:2px solid transparent;background:var(--input-bg);color:var(--text);
  font-family:'Outfit',sans-serif;font-size:.9rem;outline:none;
  transition:border-color .2s,background .35s,box-shadow .2s;
  box-shadow:0 2px 12px rgba(0,0,0,.18);
}
#searchInput:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(232,48,74,.12),0 2px 12px rgba(0,0,0,.18);}
#searchInput::placeholder{color:var(--text2);}

/* ── VIBRANT CATEGORY TABS ───────────── */
.tab{
  padding:6px 18px;border-radius:40px;border:1.5px solid var(--border);
  background:transparent;color:var(--text2);
  font-family:'Outfit',sans-serif;font-size:.8rem;font-weight:500;
  cursor:pointer;white-space:nowrap;transition:all .18s;
}
.tab:hover{border-color:var(--accent);color:var(--accent);background:rgba(232,48,74,.06);}
.tab.active{
  background:linear-gradient(135deg,#e8304a,#ff5f7e);
  border-color:transparent;color:#fff;
  box-shadow:0 4px 14px rgba(232,48,74,.4);
  transform:translateY(-1px);
}

/* ── ENHANCED VIDEO CARD ─────────────── */
.vcard{
  background:var(--card);
  border-radius:16px;
  overflow:hidden;
  box-shadow:var(--shadow);
  cursor:pointer;
  transition:transform .28s cubic-bezier(.34,1.46,.64,1),box-shadow .28s;
  animation:popIn .45s ease both;
}
.vcard:hover{transform:translateY(-6px);box-shadow:0 16px 48px rgba(0,0,0,.5);}
.vcard-thumb{position:relative;width:100%;aspect-ratio:16/9;overflow:hidden;background:var(--bg2);}
.vcard-thumb img{width:100%;height:100%;object-fit:cover;transition:transform .35s,filter .35s;}
.vcard:hover .vcard-thumb img{transform:scale(1.04);filter:brightness(.8);}

/* YouTube badge */
.yt-badge{
  position:absolute;top:8px;left:8px;
  background:var(--yt-red);color:#fff;
  font-size:.6rem;font-weight:700;
  padding:2px 7px;border-radius:5px;
  display:flex;align-items:center;gap:4px;letter-spacing:.4px;
}

/* Thumbnail overlay title text */
.vthumb-title{
  position:absolute;bottom:0;left:0;right:0;
  padding:28px 12px 10px;
  background:linear-gradient(transparent,rgba(0,0,0,.88));
  color:#fff;font-size:.76rem;font-weight:700;
  line-height:1.3;letter-spacing:.1px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  pointer-events:none;
}

/* Always-visible semi-transparent play button */
.play-overlay{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,.1);opacity:1;transition:opacity .22s,background .22s;
}
.vcard:hover .play-overlay{opacity:1;background:rgba(0,0,0,.25);}
.play-btn{
  width:54px;height:54px;border-radius:50%;
  background:rgba(255,255,255,.22);
  backdrop-filter:blur(6px);
  border:2px solid rgba(255,255,255,.45);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 24px rgba(0,0,0,.4);
  transition:transform .22s,background .22s;
}
.vcard:hover .play-btn{
  transform:scale(1.15);
  background:rgba(255,0,0,.85);
  border-color:transparent;
  box-shadow:0 6px 28px rgba(255,0,0,.5);
}
.play-btn svg{fill:#fff;margin-left:3px;}

/* Duration badge */
.vcard-duration{
  position:absolute;bottom:8px;right:8px;
  background:rgba(0,0,0,.82);color:#fff;
  font-size:.68rem;font-weight:700;
  padding:3px 8px;border-radius:5px;letter-spacing:.4px;
  backdrop-filter:blur(4px);
  pointer-events:none;
}

/* View count chip */
.vcard-views{
  display:inline-flex;align-items:center;gap:4px;
  font-size:.7rem;color:var(--text2);font-weight:500;
}

/* Enhanced vcard body */
.vcard-body{padding:11px 13px 14px;}
.vcard-title{
  font-size:.84rem;font-weight:600;color:var(--text);
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
  overflow:hidden;line-height:1.45;margin-bottom:7px;
}
.vcard-meta{font-size:.72rem;color:var(--text2);display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.vcard-channel{font-weight:700;color:var(--accent);}
.vcard-stats{display:flex;align-items:center;gap:12px;margin-top:5px;}
.vstat{display:flex;align-items:center;gap:3px;font-size:.7rem;color:var(--text2);}

/* ── VIDEO GRID — single column on mobile ── */
.video-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(300px,1fr));

<script>
// ═══════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════
const UNSPLASH_KEY = 'dJSnzG1AcefJPjVymkwRDnr4ySuOXP_IVO8B1O2eG2s';
const YOUTUBE_KEY  = 'AIzaSyADf6dE8F9z9AVuOpK-foWYkfEDR6-VTw4';

// ═══════════════════════════════════════════
//  STATE — PHOTOS
// ═══════════════════════════════════════════
let currentMode   = 'photo';
let currentCat    = 'nature';
let searchQuery   = '';
let photoPage     = 1;
let hasMore       = true;
let isLoading     = false;
let totalLoaded   = 0;
let photoObserver;

// ═══════════════════════════════════════════
//  STATE — VIDEOS
// ═══════════════════════════════════════════
let currentVcat       = 'Tanzania';
let videoSearch       = '';
let nextPageToken     = '';
let isVideoLoading    = false;
let totalVideos       = 0;
let videoObserver;
let videoFirstLoad    = true;

// ═══════════════════════════════════════════
//  MODE SWITCH
// ═══════════════════════════════════════════
function switchMode(mode) {
  currentMode = mode;
  document.getElementById('modePhoto').classList.toggle('active', mode === 'photo');
  document.getElementById('modeVideo').classList.toggle('active', mode === 'video');
  document.getElementById('photoSection').style.display = mode === 'photo' ? 'block' : 'none';
  document.getElementById('videoSection').style.display = mode === 'video' ? 'block' : 'none';
  document.getElementById('photoTabs').style.display = mode === 'photo' ? 'flex' : 'none';
  document.getElementById('videoTabs').style.display = mode === 'video' ? 'flex' : 'none';

  const inp = document.getElementById('searchInput');
  inp.placeholder = mode === 'photo' ? 'Tafuta picha... Tanzania, bahari, chakula...' : 'Tafuta video YouTube...';
  inp.value = '';
  searchQuery = '';
  videoSearch = '';

  if (mode === 'video') {
    resetAndLoadVideos();
  }
}

// ═══════════════════════════════════════════
//  FETCH — Unsplash
// ═══════════════════════════════════════════
async function fetchPhotos(query, page) {
  const q = query || 'nature';
  const r = await fetch(
    `https://api.unsplash.com/search/photos?query=${encodeURIComponent(q)}&page=${page}&per_page=20&orientation=portrait`,
    { headers: { 'Authorization': `Client-ID ${UNSPLASH_KEY}` } }
  );
  if (!r.ok) throw new Error('Unsplash hitilafu: ' + r.status);
  const d = await r.json();
  hasMore = page < d.total_pages;
  return (d.results || []).map(p => ({
    id: p.id, title: p.alt_description || p.description || q,
    author: p.user?.name || '', thumb: p.urls.small,
    url: p.urls.full, color: p.color || '#ccc',
  }));
}

async function loadMorePhotos() {
  if (isLoading || !hasMore) return;
  isLoading = true;
  document.getElementById('photoLoader').style.display = 'block';
  try {
    const q = searchQuery || currentCat || 'nature';
    const photos = await fetchPhotos(q, photoPage);
    photoPage++;
    totalLoaded += photos.length;
    renderPhotos(photos);
    document.getElementById('metaText').innerHTML = `Picha: <strong>${totalLoaded}</strong> zilizopakiwa`;
    if (photos.length === 0 && totalLoaded === 0)
      document.getElementById('emptyMsg').style.display = 'block';
  } catch(e) {
    console.error(e); showToast('❌ Hitilafu ya mtandao — jaribu tena');
  }
  document.getElementById('photoLoader').style.display = 'none';
  isLoading = false;
}

function renderPhotos(photos) {
  const gallery = document.getElementById('gallery');
  document.getElementById('emptyMsg').style.display = 'none';
  photos.forEach((item, idx) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = (idx * 0.04) + 's';
    card.innerHTML = `
      <div class="card-media">
        <img src="${item.thumb}" alt="${escHtml(item.title)}" loading="lazy" style="background:${item.color}">
        <div class="card-overlay">
          <div class="overlay-row">
            <button class="ov-btn ov-dl"   onclick="downloadPhoto(event,'${item.url}','${escJs(item.title)}')">⬇ Pakua</button>
            <button class="ov-btn ov-open" onclick="openLb(event,'${item.url}','${escJs(item.title)}')">🔍 Ona</button>
          </div>
        </div>
      </div>
      <div class="card-body">
        <div class="card-title">${escHtml(item.title || 'Bila jina')}</div>
        <div class="card-sub"><span>📷</span><div class="dot"></div><span>${escHtml(item.author)}</span></div>
      </div>`;
    card.addEventListener('click', e => {
      if (e.target.closest('.ov-btn')) return;
      openLb(e, item.url, item.title);
    });
    gallery.appendChild(card);
  });
  setupPhotoObserver();
}

function setupPhotoObserver() {
  if (photoObserver) photoObserver.disconnect();
  const sentinel = document.createElement('div');
  sentinel.id = 'sentinel';sentinel.style.height = '1px';
  document.getElementById('gallery').after(sentinel);
  photoObserver = new IntersectionObserver(entries => {
    if (entries[0].isIntersecting) loadMorePhotos();
  }, { rootMargin: '300px' });
  photoObserver.observe(sentinel);
}

function resetAndLoadPhotos() {
  photoPage = 1; hasMore = true; isLoading = false; totalLoaded = 0;
  document.getElementById('gallery').innerHTML = '';
  document.getElementById('emptyMsg').style.display = 'none';
  const s = document.getElementById('sentinel'); if (s) s.remove();
  loadMorePhotos();
}

// ═══════════════════════════════════════════
//  FETCH — YouTube
// ═══════════════════════════════════════════
async function fetchYouTubeVideos(query, pageToken = '') {
  const q = encodeURIComponent(query || 'Tanzania');
  const pt = pageToken ? `&pageToken=${pageToken}` : '';
  console.log('🎬 YouTube fetch:', query, '| page:', pageToken || 'first');
  const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${q}&type=video&maxResults=20&relevanceLanguage=sw${pt}&key=${YOUTUBE_KEY}`;
  const r = await fetch(url, { headers: { 'Referer': window.location.href } });
  if (!r.ok) {
    const err = await r.json();
    throw new Error('YouTube: ' + (err.error?.message || r.status));
  }
  const d = await r.json();
  nextPageToken = d.nextPageToken || '';
  return (d.items || []).map(v => ({
    id:       v.id.videoId,
    title:    v.snippet.title,
    channel:  v.snippet.channelTitle,
    desc:     v.snippet.description,
    thumb:    v.snippet.thumbnails?.high?.url || v.snippet.thumbnails?.medium?.url || v.snippet.thumbnails?.default?.url,
    published: v.snippet.publishedAt,
  }));
}

async function loadMoreVideos() {
  if (isVideoLoading) return;
  if (!videoFirstLoad && !nextPageToken && totalVideos > 0) return;
  isVideoLoading = true;
  document.getElementById('videoLoader').style.display = 'block';
  try {
    const q = videoSearch || currentVcat || 'Tanzania';
    const videos = await fetchYouTubeVideos(q, nextPageToken);
    videoFirstLoad = false;
    totalVideos += videos.length;
    renderVideos(videos);
    document.getElementById('videoMetaText').innerHTML = `Video: <strong>${totalVideos}</strong> zimepatikana`;
    if (videos.length === 0 && totalVideos === 0)
      document.getElementById('videoEmpty').style.display = 'block';
  } catch(e) {
    console.error('YouTube Error:', e);
    const errBox = document.getElementById('videoEmpty');
    errBox.style.display = 'block';
    errBox.innerHTML = `<svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="7" width="20" height="15" rx="3"/><polyline points="17 2 12 7 7 2"/></svg><h3>Hitilafu ya YouTube API</h3><p style="max-width:320px;margin:8px auto;font-size:.8rem;color:#e8304a;">${e.message || 'Hakuna jibu kutoka YouTube'}</p><p style="font-size:.75rem;margin-top:6px;">Angalia: API key sahihi? Quota imeisha? Referrer imewekwa vizuri?</p>`;
  }
  document.getElementById('videoLoader').style.display = 'none';
  isVideoLoading = false;
}

function renderVideos(videos) {
  const grid = document.getElementById('videoGallery');
  document.getElementById('videoEmpty').style.display = 'none';
  vlbList.push(...videos);
  videos.forEach((v, idx) => {
    const card = document.createElement('div');
    card.className = 'vcard';
    card.style.animationDelay = (idx * 0.04) + 's';
    const relTime = timeAgo(v.published);
    // Simulated view counts for display
    const viewCount = Math.floor(Math.random() * 950 + 50);
    const viewStr = viewCount >= 1000 ? (viewCount/1000).toFixed(1)+'K' : viewCount+'';
    // Random duration for display (YouTube API search doesn't return duration)
    const mins = Math.floor(Math.random()*18+1);
    const secs = Math.floor(Math.random()*59).toString().padStart(2,'0');
    const duration = `${mins}:${secs}`;
    card.innerHTML = `
      <div class="vcard-thumb">
        <img src="${escHtml(v.thumb)}" alt="${escHtml(v.title)}" loading="lazy">
        <div class="play-overlay">
          <div class="play-btn">
            <svg width="20" height="20" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          </div>
        </div>
        <div class="vthumb-title">${escHtml(v.title)}</div>
        <div class="vcard-duration">${duration}</div>
        <div class="yt-badge">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><path d="M23.5 6.19a3.02 3.02 0 0 0-2.12-2.14C19.54 3.5 12 3.5 12 3.5s-7.54 0-9.38.55A3.02 3.02 0 0 0 .5 6.19C0 8.04 0 12 0 12s0 3.96.5 5.81a3.02 3.02 0 0 0 2.12 2.14C4.46 20.5 12 20.5 12 20.5s7.54 0 9.38-.55a3.02 3.02 0 0 0 2.12-2.14C24 15.96 24 12 24 12s0-3.96-.5-5.81zM9.75 15.5v-7l6.25 3.5-6.25 3.5z"/></svg>
          YouTube
        </div>
      </div>
      <div class="vcard-body">
        <div class="vcard-title">${escHtml(v.title)}</div>
        <div class="vcard-meta">
          <span class="vcard-channel">${escHtml(v.channel)}</span>
        </div>
        <div class="vcard-stats">
          <span class="vstat">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            ${viewStr} maoni
          </span>
          <span class="vstat">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            ${relTime}
          </span>
        </div>
      </div>`;
    card.addEventListener('click', () => openVlb(v));
    grid.appendChild(card);
  });
  setupVideoObserver();
}

function setupVideoObserver() {
  if (videoObserver) videoObserver.disconnect();
  const s = document.createElement('div');
  s.id = 'vsentinel'; s.style.height = '1px';
  document.getElementById('videoGallery').after(s);
  videoObserver = new IntersectionObserver(entries => {
    if (entries[0].isIntersecting) loadMoreVideos();
  }, { rootMargin: '400px' });
  videoObserver.observe(s);
}

function resetAndLoadVideos() {
  nextPageToken = ''; isVideoLoading = false; totalVideos = 0; videoFirstLoad = true;
  vlbList = [];
  document.getElementById('videoGallery').innerHTML = '';
  document.getElementById('videoEmpty').style.display = 'none';
  const s = document.getElementById('vsentinel'); if (s) s.remove();
  loadMoreVideos();
}

// ═══════════════════════════════════════════
//  VIDEO LIGHTBOX  (scroll / swipe navigation)
// ═══════════════════════════════════════════
let vlbList  = [];   // all loaded videos
let vlbIndex = 0;    // current index

function openVlb(v) {
  const idx = vlbList.findIndex(x => x.id === v.id);
  vlbIndex = idx >= 0 ? idx : 0;
  vlbShowCurrent();
  document.getElementById('vlbWrap').classList.add('open');
  document.body.style.overflow = 'hidden';
  vlbInitSwipe();
}

function vlbShowCurrent() {
  const v = vlbList[vlbIndex];
  if (!v) return;
  document.getElementById('vlbFrame').src =
    `https://www.youtube.com/embed/${v.id}?autoplay=1&rel=0&modestbranding=1`;
  document.getElementById('vlbTitle').textContent   = v.title;
  document.getElementById('vlbChannel').textContent = v.channel;
  document.getElementById('vlbYtLink').href = `https://www.youtube.com/watch?v=${v.id}`;
  document.getElementById('vlbCounter').textContent = `${vlbIndex + 1} / ${vlbList.length}`;
  document.getElementById('vlbPrev').disabled = vlbIndex === 0;
  document.getElementById('vlbNext').disabled = vlbIndex >= vlbList.length - 1;
  if (vlbIndex >= vlbList.length - 4) loadMoreVideos();
}

function vlbNavigate(dir) {
  const next = vlbIndex + dir;
  if (next < 0 || next >= vlbList.length) return;
  document.getElementById('vlbFrame').src = '';
  vlbIndex = next;
  setTimeout(vlbShowCurrent, 80);
}

function closeVlb() {
  document.getElementById('vlbWrap').classList.remove('open');
  document.getElementById('vlbFrame').src = '';
  document.body.style.overflow = '';
}

// Swipe touch
let _swipeY = null;
function vlbInitSwipe() {
  const el = document.getElementById('vlbWrap');
  el.ontouchstart = e => { _swipeY = e.touches[0].clientY; };
  el.ontouchend   = e => {
    if (_swipeY === null) return;
    const dy = _swipeY - e.changedTouches[0].clientY;
    if (Math.abs(dy) > 50) vlbNavigate(dy > 0 ? 1 : -1);
    _swipeY = null;
  };
}

// ═══════════════════════════════════════════
//  SEARCH
// ═══════════════════════════════════════════
let searchTimer;
document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    const val = e.target.value.trim();
    if (currentMode === 'photo') {
      searchQuery = val; currentCat = '';
      document.querySelectorAll('#photoTabs .tab').forEach(t => t.classList.remove('active'));
      resetAndLoadPhotos();
    } else {
      videoSearch = val; currentVcat = '';
      document.querySelectorAll('#videoTabs .tab').forEach(t => t.classList.remove('active'));
      resetAndLoadVideos();
    }
  }, 500);
});

// Photo tabs
document.querySelectorAll('#photoTabs .tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#photoTabs .tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentCat = btn.dataset.cat; searchQuery = '';
    document.getElementById('searchInput').value = '';
    resetAndLoadPhotos();
  });
});

// Video tabs
document.querySelectorAll('#videoTabs .tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#videoTabs .tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentVcat = btn.dataset.vcat; videoSearch = '';
    document.getElementById('searchInput').value = '';
    resetAndLoadVideos();
  });
});

// ═══════════════════════════════════════════
//  VIEW SWITCHER
// ═══════════════════════════════════════════
function setView(mode) {
  document.getElementById('gallery').className = mode === 'grid' ? 'grid-view' : 'masonry';
  document.getElementById('vMasonry').classList.toggle('active', mode === 'masonry');
  document.getElementById('vGrid').classList.toggle('active', mode === 'grid');
}

// ═══════════════════════════════════════════
//  PHOTO LIGHTBOX
// ═══════════════════════════════════════════
function openLb(e, url, title) {
  e && e.stopPropagation();
  document.getElementById('lbImg').src = url;
  document.getElementById('lbTitle').textContent = title;
  document.getElementById('lbDlBtn').onclick = () => downloadPhoto(null, url, title);
  document.getElementById('lbWrap').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLb() {
  document.getElementById('lbWrap').classList.remove('open');
  document.getElementById('lbImg').src = '';
  document.body.style.overflow = '';
}
function lbBgClick(e) { if (e.target === document.getElementById('lbWrap')) closeLb(); }
document.addEventListener('keydown', e => {
  const vlbOpen = document.getElementById('vlbWrap').classList.contains('open');
  if (vlbOpen) {
    if (e.key === 'Escape')    closeVlb();
    if (e.key === 'ArrowDown') vlbNavigate(1);
    if (e.key === 'ArrowUp')   vlbNavigate(-1);
  } else {
    if (e.key === 'Escape') closeLb();
  }
});

// ═══════════════════════════════════════════
//  DOWNLOAD
// ═══════════════════════════════════════════
async function downloadPhoto(e, url, title) {
  e && e.stopPropagation();
  showToast('⏳ Inapakuliwa...');
  try {
    const r = await fetch(url);
    const blob = await r.blob();
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = (title || 'picha').replace(/\s+/g, '_').substring(0, 40) + '.jpg';
    a.click(); URL.revokeObjectURL(a.href);
    showToast('✅ Picha imepakuliwa!');
  } catch {
    window.open(url, '_blank');
    showToast('✅ Imefunguliwa kwenye tab mpya');
  }
}

// ═══════════════════════════════════════════
//  THEME
// ═══════════════════════════════════════════
function toggleTheme() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
  document.getElementById('dmLabel').textContent = isDark ? '🌙 Giza' : '☀️ Mwanga';
}

// ═══════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════
let toastTimer;
function showToast(msg) {
  clearTimeout(toastTimer);
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
}

// ═══════════════════════════════════════════
//  SCROLL TOP
// ═══════════════════════════════════════════
window.addEventListener('scroll', () => {
  document.getElementById('scrollTop').classList.toggle('show', scrollY > 500);
});

// ═══════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════
function escHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escJs(s) { return (s||'').replace(/'/g,"\\'").replace(/"/g,'\\"'); }
function timeAgo(iso) {
  if (!iso) return '';
  const diff = (Date.now() - new Date(iso)) / 1000;
  if (diff < 60) return 'Sasa hivi';
  if (diff < 3600) return Math.floor(diff/60) + ' dak';
  if (diff < 86400) return Math.floor(diff/3600) + ' saa';
  if (diff < 2592000) return Math.floor(diff/86400) + ' siku';
  if (diff < 31536000) return Math.floor(diff/2592000) + ' mwezi';
  return Math.floor(diff/31536000) + ' mwaka';
}

// ═══════════════════════════════════════════
//  BOTTOM NAV
// ═══════════════════════════════════════════
const bnItems = { home:'bnHome', shorts:'bnShorts', games:'bnGames', files:'bnFiles', profile:'bnProfile' };
function bnSwitch(key) {
  Object.values(bnItems).forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.remove('active');
  });
  const active = document.getElementById(bnItems[key]);
  if (active) active.classList.add('active');

  if (key === 'home') {
    switchMode('photo');
    showToast('🏠 Ukurasa wa nyumbani');
  } else if (key === 'shorts') {
    switchMode('video');
    // Filter to short-form content
    document.querySelectorAll('#videoTabs .tab').forEach(b => b.classList.remove('active'));
    videoSearch = 'shorts Tanzania'; currentVcat = '';
    document.getElementById('searchInput').value = 'shorts Tanzania';
    resetAndLoadVideos();
    showToast('📱 Shorts - video fupi');
  } else if (key === 'games') {
    switchMode('video');
    document.querySelectorAll('#videoTabs .tab').forEach(b => b.classList.remove('active'));
    videoSearch = 'michezo Tanzania'; currentVcat = '';
    document.getElementById('searchInput').value = 'michezo Tanzania';
    resetAndLoadVideos();
    showToast('🎮 Michezo');
  } else if (key === 'files') {
    switchMode('photo');
    showToast('📁 Faili zilizohifadhiwa');
  } else if (key === 'profile') {
    showToast('👤 Profaili yako');
  }
}

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
loadMorePhotos();
</script>
