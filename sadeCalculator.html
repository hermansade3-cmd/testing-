<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SadeCalculator</title>

<style>

body{
    margin:0;
    padding:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#0d6efd;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.calculator{
    background:white;
    width:320px;
    padding:20px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.title{
    text-align:center;
    font-size:22px;
    font-weight:bold;
    color:#0d6efd;
    margin-bottom:15px;
}

.display{
    width:100%;
    height:60px;
    border:none;
    background:#e9f1ff;
    border-radius:10px;
    text-align:right;
    font-size:24px;
    padding-right:10px;
    margin-bottom:15px;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

button{
    height:55px;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

.number{
    background:#f2f6ff;
}

.operator{
    background:#0d6efd;
    color:white;
}

.equal{
    background:#0d6efd;
    color:white;
    grid-column:span 2;
}

.clear{
    background:#ff4d4d;
    color:white;
}

button:hover{
    opacity:0.9;
}

.footer{
    text-align:center;
    font-size:12px;
    margin-top:10px;
    color:#555;
}

</style>
</head>

<body>

<div class="calculator">

<div class="title">SadeCalculator</div>

<input type="text" id="display" class="display" disabled>

<div class="buttons">

<button class="clear" onclick="clearDisplay()">C</button>
<button class="operator" onclick="append('/')">÷</button>
<button class="operator" onclick="append('*')">×</button>
<button class="operator" onclick="append('-')">−</button>

<button class="number" onclick="append('7')">7</button>
<button class="number" onclick="append('8')">8</button>
<button class="number" onclick="append('9')">9</button>
<button class="operator" onclick="append('+')">+</button>

<button class="number" onclick="append('4')">4</button>
<button class="number" onclick="append('5')">5</button>
<button class="number" onclick="append('6')">6</button>
<button class="number" onclick="append('.')">.</button>

<button class="number" onclick="append('1')">1</button>
<button class="number" onclick="append('2')">2</button>
<button class="number" onclick="append('3')">3</button>
<button class="number" onclick="append('0')">0</button>

<button class="equal" onclick="calculate()">=</button>

</div>

<div class="footer">
Created by Herman Sade
</div>

</div>

<script>

function append(value){
document.getElementById("display").value += value;
}

function clearDisplay(){
document.getElementById("display").value = "";
}

function calculate(){
let display = document.getElementById("display");
try{
display.value = eval(display.value);
}
catch{
display.value = "Error";
}
}

</script>

</body>
</html>
