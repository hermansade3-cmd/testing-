<!DOCTYPE html>
<html lang="sw">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ingia | SadeBooks</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --navy: #0a1628;
      --navy-mid: #112240;
      --navy-light: #1a3358;
      --gold: #c9a84c;
      --gold-light: #e8c96a;
      --gold-dim: rgba(201,168,76,0.15);
      --white: #f5f0e8;
      --white-dim: rgba(245,240,232,0.65);
      --error: #e05c5c;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: var(--navy);
      font-family: 'DM Sans', sans-serif;
      color: var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Decorative background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(201,168,76,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 80% 90%, rgba(26,51,88,0.8) 0%, transparent 60%);
      pointer-events: none;
    }

    .grid-lines {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(201,168,76,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(201,168,76,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
    }

    /* Floating orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.12;
      pointer-events: none;
      animation: drift 12s ease-in-out infinite alternate;
    }
    .orb-1 { width: 380px; height: 380px; background: var(--gold); top: -100px; left: -80px; animation-delay: 0s; }
    .orb-2 { width: 260px; height: 260px; background: #2a6fa8; bottom: -60px; right: -40px; animation-delay: -5s; }

    @keyframes drift {
      from { transform: translate(0, 0); }
      to   { transform: translate(30px, 20px); }
    }

    /* Card */
    .card {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 420px;
      margin: 24px;
      background: var(--navy-mid);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 20px;
      padding: 40px 36px 36px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(201,168,76,0.05) inset;
      animation: rise 0.7s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(32px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Logo area */
    .logo-area {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, var(--gold), #a07820);
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 14px;
      box-shadow: 0 8px 24px rgba(201,168,76,0.3);
      font-size: 26px;
    }

    .logo-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.9rem;
      font-weight: 900;
      background: linear-gradient(135deg, var(--gold-light), var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.01em;
      line-height: 1.1;
    }

    .logo-sub {
      font-size: 0.82rem;
      color: var(--white-dim);
      margin-top: 4px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* Tabs */
    .tabs {
      display: flex;
      background: var(--navy);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 28px;
      border: 1px solid rgba(201,168,76,0.1);
    }

    .tab-btn {
      flex: 1;
      padding: 9px;
      border: none;
      background: transparent;
      color: var(--white-dim);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      font-weight: 500;
      border-radius: 7px;
      cursor: pointer;
      transition: all 0.25s;
    }

    .tab-btn.active {
      background: linear-gradient(135deg, var(--gold), #a07820);
      color: var(--navy);
      font-weight: 700;
      box-shadow: 0 4px 12px rgba(201,168,76,0.25);
    }

    /* Forms */
    .form-panel { display: none; }
    .form-panel.active { display: block; animation: fadeIn 0.3s ease; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .field { margin-bottom: 18px; }

    .field label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--white-dim);
      margin-bottom: 7px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .field input {
      width: 100%;
      padding: 12px 16px;
      background: var(--navy);
      border: 1px solid rgba(201,168,76,0.18);
      border-radius: 10px;
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .field input::placeholder { color: rgba(245,240,232,0.3); }

    .field input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(201,168,76,0.1);
    }

    /* Password wrapper */
    .pw-wrap { position: relative; }
    .pw-wrap input { padding-right: 44px; }
    .pw-toggle {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--white-dim);
      font-size: 18px;
      line-height: 1;
      padding: 0;
      transition: color 0.2s;
    }
    .pw-toggle:hover { color: var(--gold); }

    /* Forgot link */
    .forgot-link {
      display: block;
      text-align: right;
      font-size: 0.78rem;
      color: var(--gold);
      margin-top: -10px;
      margin-bottom: 20px;
      text-decoration: none;
      opacity: 0.85;
      transition: opacity 0.2s;
      cursor: pointer;
    }
    .forgot-link:hover { opacity: 1; }

    /* Main button */
    .btn-primary {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, var(--gold-light), var(--gold));
      color: var(--navy);
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.97rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.25s;
      box-shadow: 0 4px 18px rgba(201,168,76,0.3);
      letter-spacing: 0.02em;
      position: relative;
      overflow: hidden;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 28px rgba(201,168,76,0.4);
    }

    .btn-primary:active { transform: translateY(0); }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    /* Spinner inside button */
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(10,22,40,0.3);
      border-top-color: var(--navy);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Divider */
    .google-icon {
      display: none;
    }

    /* Error / success messages */
    .msg {
      padding: 11px 14px;
      border-radius: 8px;
      font-size: 0.84rem;
      margin-bottom: 16px;
      display: none;
      animation: fadeIn 0.3s ease;
    }
    .msg.error  { background: rgba(224,92,92,0.12); border: 1px solid rgba(224,92,92,0.3); color: #f08080; }
    .msg.success{ background: rgba(76,175,80,0.12); border: 1px solid rgba(76,175,80,0.3);  color: #81c784; }
    .msg.show   { display: block; }

    /* Footer note */
    .footer-note {
      text-align: center;
      font-size: 0.76rem;
      color: rgba(245,240,232,0.3);
      margin-top: 24px;
      line-height: 1.6;
    }
    .footer-note a {
      color: var(--gold);
      text-decoration: none;
      opacity: 0.85;
    }
    .footer-note a:hover { opacity: 1; }

    /* Logged-in state */
    .user-panel {
      display: none;
      text-align: center;
      animation: rise 0.5s cubic-bezier(.22,1,.36,1) both;
    }

    .user-avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 3px solid var(--gold);
      margin: 0 auto 16px;
      object-fit: cover;
      box-shadow: 0 0 0 6px var(--gold-dim);
    }

    .user-avatar-placeholder {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 3px solid var(--gold);
      margin: 0 auto 16px;
      background: linear-gradient(135deg, var(--gold), #a07820);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: 700;
      color: var(--navy);
      box-shadow: 0 0 0 6px var(--gold-dim);
    }

    .user-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 4px;
    }

    .user-email {
      font-size: 0.83rem;
      color: var(--white-dim);
      margin-bottom: 24px;
    }

    .welcome-badge {
      background: var(--gold-dim);
      border: 1px solid rgba(201,168,76,0.25);
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 0.85rem;
      color: var(--gold-light);
      margin-bottom: 24px;
    }

    .btn-goto {
      display: inline-block;
      padding: 12px 28px;
      background: linear-gradient(135deg, var(--gold-light), var(--gold));
      color: var(--navy);
      border-radius: 10px;
      font-weight: 700;
      font-size: 0.93rem;
      text-decoration: none;
      margin-bottom: 14px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 18px rgba(201,168,76,0.3);
      transition: all 0.25s;
    }
    .btn-goto:hover { transform: translateY(-1px); box-shadow: 0 8px 28px rgba(201,168,76,0.4); }

    .btn-logout {
      width: 100%;
      padding: 11px;
      background: transparent;
      border: 1px solid rgba(224,92,92,0.3);
      border-radius: 10px;
      color: #f08080;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      cursor: pointer;
      transition: all 0.25s;
    }
    .btn-logout:hover { background: rgba(224,92,92,0.08); border-color: rgba(224,92,92,0.5); }
  </style>
</head>
<body>
  <div class="grid-lines"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="card">

    <!-- Logo -->
    <div class="logo-area">
      <div class="logo-icon">📚</div>
      <div class="logo-title">SadeBooks</div>
      <div class="logo-sub">Duka la Vitabu vya Kidijitali</div>
    </div>

    <!-- ===== AUTH FORMS ===== -->
    <div id="authSection">

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('login')">Ingia</button>
        <button class="tab-btn" onclick="switchTab('register')">Jisajili</button>
      </div>

      <!-- Message box -->
      <div class="msg" id="msgBox"></div>

      <!-- LOGIN FORM -->
      <div class="form-panel active" id="loginPanel">
        <div class="field">
          <label>Barua Pepe</label>
          <input type="email" id="loginEmail" placeholder="mfano@gmail.com" autocomplete="email"/>
        </div>
        <div class="field">
          <label>Nywila</label>
          <div class="pw-wrap">
            <input type="password" id="loginPw" placeholder="Nywila yako" autocomplete="current-password"/>
            <button class="pw-toggle" onclick="togglePw('loginPw', this)">👁</button>
          </div>
        </div>
        <span class="forgot-link" onclick="sendReset()">Umesahau nywila?</span>
        <button class="btn-primary" id="loginBtn" onclick="doLogin()">Ingia</button>
      </div>

      <!-- REGISTER FORM -->
      <div class="form-panel" id="registerPanel">
        <div class="field">
          <label>Jina Kamili</label>
          <input type="text" id="regName" placeholder="Jina lako" autocomplete="name"/>
        </div>
        <div class="field">
          <label>Barua Pepe</label>
          <input type="email" id="regEmail" placeholder="mfano@gmail.com" autocomplete="email"/>
        </div>
        <div class="field">
          <label>Nywila</label>
          <div class="pw-wrap">
            <input type="password" id="regPw" placeholder="Angalau herufi 6" autocomplete="new-password"/>
            <button class="pw-toggle" onclick="togglePw('regPw', this)">👁</button>
          </div>
        </div>
        <button class="btn-primary" id="registerBtn" onclick="doRegister()">Jisajili</button>
      </div>
    </div>

    <!-- ===== LOGGED IN STATE ===== -->
    <div class="user-panel" id="userPanel">
      <div id="avatarWrap"></div>
      <div class="user-name" id="userName">—</div>
      <div class="user-email" id="userEmail">—</div>
      <div class="welcome-badge">✅ Umeingia kikamilifu kwenye SadeBooks</div>
      <a href="index.html" class="btn-goto">🏠 Nenda Dukani</a>
      <button class="btn-logout" onclick="doLogout()">🚪 Toka</button>
    </div>

    <div class="footer-note">
      Kwa maswali: <a href="/cdn-cgi/l/email-protection#254d405748444b5644414016654248444c490b464a48"><span class="__cf_email__" data-cfemail="bfd7dacdd2ded1ccdedbda8cffd8d2ded6d391dcd0d2">[email&#160;protected]</span></a><br/>
      &copy; 2025 SadeBooks · <a href="privacy_and_terms.html">Masharti ya Matumizi</a>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getAuth, onAuthStateChanged,
      signInWithEmailAndPassword, createUserWithEmailAndPassword,
      sendPasswordResetEmail, updateProfile, signOut
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey:            "AIzaSyBPkx-WMYTTongmbYGUy2w86wxF3QprNkQ",
      authDomain:        "sadebooks-ce48b.firebaseapp.com",
      projectId:         "sadebooks-ce48b",
      storageBucket:     "sadebooks-ce48b.firebasestorage.app",
      messagingSenderId: "746477327",
      appId:             "1:746477327:web:6351c78b68827a0525507a",
      measurementId:     "G-234Z9S8C67"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // ── Observe auth state ──────────────────────────────────────
    onAuthStateChanged(auth, (user) => {
      if (user) showUserPanel(user);
      else       showAuthSection();
    });

    // ── Helpers ─────────────────────────────────────────────────
    function setLoading(btnId, loading) {
      const btn = document.getElementById(btnId);
      if (!btn) return;
      btn.disabled = loading;
      btn.innerHTML = loading
        ? '<span class="spinner"></span>Subiri...'
        : (btnId === 'loginBtn' ? 'Ingia' : 'Jisajili');
    }

    function showMsg(text, type = 'error') {
      const box = document.getElementById('msgBox');
      box.textContent = text;
      box.className = `msg ${type} show`;
      setTimeout(() => box.classList.remove('show'), 5000);
    }

    function showUserPanel(user) {
      sessionStorage.setItem("sb_logged_in", "1");
      document.getElementById('authSection').style.display = 'none';
      const panel = document.getElementById('userPanel');
      panel.style.display = 'block';
      document.getElementById('userName').textContent  = user.displayName || 'Karibu!';
      document.getElementById('userEmail').textContent = user.email || '';
      const wrap = document.getElementById('avatarWrap');
      if (user.photoURL) {
        wrap.innerHTML = `<img src="${user.photoURL}" class="user-avatar" alt="picha"/>`;
      } else {
        const letter = (user.displayName || user.email || 'U')[0].toUpperCase();
        wrap.innerHTML = `<div class="user-avatar-placeholder">${letter}</div>`;
      }
    }

    function showAuthSection() {
      document.getElementById('authSection').style.display = 'block';
      document.getElementById('userPanel').style.display   = 'none';
    }

    // ── Exposed globals ──────────────────────────────────────────
    window.doLogin = async () => {
      const email = document.getElementById('loginEmail').value.trim();
      const pw    = document.getElementById('loginPw').value;
      if (!email || !pw) return showMsg('Jaza barua pepe na nywila.');
      setLoading('loginBtn', true);
      try {
        await signInWithEmailAndPassword(auth, email, pw);
      } catch (e) {
        setLoading('loginBtn', false);
        const msgs = {
          'auth/user-not-found':  'Akaunti haipo. Jisajili kwanza.',
          'auth/wrong-password':  'Nywila si sahihi.',
          'auth/invalid-email':   'Barua pepe si sahihi.',
          'auth/too-many-requests':'Majaribio mengi. Jaribu baadaye.',
          'auth/invalid-credential': 'Barua pepe au nywila si sahihi.'
        };
        showMsg(msgs[e.code] || 'Hitilafu: ' + e.message);
      }
    };

    window.doRegister = async () => {
      const name  = document.getElementById('regName').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const pw    = document.getElementById('regPw').value;
      if (!name)           return showMsg('Weka jina lako.');
      if (!email)          return showMsg('Weka barua pepe.');
      if (pw.length < 6)   return showMsg('Nywila lazima iwe herufi 6 au zaidi.');
      setLoading('registerBtn', true);
      try {
        const cred = await createUserWithEmailAndPassword(auth, email, pw);
        await updateProfile(cred.user, { displayName: name });
      } catch (e) {
        setLoading('registerBtn', false);
        const msgs = {
          'auth/email-already-in-use': 'Barua pepe hii tayari imetumika.',
          'auth/invalid-email':        'Barua pepe si sahihi.',
          'auth/weak-password':        'Nywila ni dhaifu sana.'
        };
        showMsg(msgs[e.code] || 'Hitilafu: ' + e.message);
      }
    };

    window.sendReset = async () => {
      const email = document.getElementById('loginEmail').value.trim();
      if (!email) return showMsg('Weka barua pepe kwanza, kisha bonyeza "Umesahau nywila?"');
      try {
        await sendPasswordResetEmail(auth, email);
        showMsg('✅ Barua ya kubadilisha nywila imetumwa! Angalia inbox yako.', 'success');
      } catch (e) {
        showMsg('Hitilafu: ' + e.message);
      }
    };

    window.doLogout = async () => {
      sessionStorage.removeItem("sb_logged_in");
      await signOut(auth);
    };

    window.togglePw = (id, btn) => {
      const inp = document.getElementById(id);
      if (inp.type === 'password') { inp.type = 'text';     btn.textContent = '🙈'; }
      else                         { inp.type = 'password'; btn.textContent = '👁';  }
    };

    window.switchTab = (tab) => {
      document.querySelectorAll('.tab-btn').forEach((b, i) =>
        b.classList.toggle('active', (i === 0) === (tab === 'login'))
      );
      document.getElementById('loginPanel').classList.toggle('active',    tab === 'login');
      document.getElementById('registerPanel').classList.toggle('active', tab === 'register');
      document.getElementById('msgBox').classList.remove('show');
    };

    // Enter key triggers login/register
    document.addEventListener('keydown', (e) => {
      if (e.key !== 'Enter') return;
      const loginActive = document.getElementById('loginPanel').classList.contains('active');
      if (loginActive) doLogin();
      else doRegister();
    });

  </script>
</body>
</html>
