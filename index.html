<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sade Books - Vitabu vya Kidigitali</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --gold:        #C9A84C;
            --gold-light:  #E8C96A;
            --gold-pale:   #FDF6E3;
            --dark:        #1A1208;
            --dark-mid:    #2D2010;
            --dark2:       #221A0C;
            --brown:       #5C3D1E;
            --cream:       #FAF4E8;
            --white:       #FFFFFF;
            --text:        #3A2A10;
            --text-light:  #7A6540;
        }

        html { scroll-behavior: smooth; }
        body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--text); overflow-x: hidden; }

        /* ══════════════════════════════════
           NAV
        ══════════════════════════════════ */
        nav {
            position: sticky;
            top: 0;
            z-index: 200;
            background: rgba(250,244,232,0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(201,168,76,0.2);
            padding: 0.85rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }

        .nav-brand {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--dark);
            white-space: nowrap;
            flex-shrink: 0;
        }
        .nav-brand em { color: var(--gold); font-style: normal; }

        /* RIGHT SIDE: links + button */
        .nav-right {
            display: flex;
            align-items: center;
            gap: 0.2rem;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .nav-link {
            text-decoration: none;
            color: var(--text-light);
            font-size: 0.82rem;
            font-weight: 500;
            padding: 0.45rem 0.85rem;
            border-radius: 100px;
            transition: all 0.2s;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        .nav-link:hover {
            color: var(--gold);
            background: rgba(201,168,76,0.1);
        }
        .nav-link .nav-icon { font-size: 0.8rem; }

        .nav-link.active {
            color: var(--gold);
            background: rgba(201,168,76,0.12);
            font-weight: 600;
        }

        .nav-divider {
            width: 1px;
            height: 18px;
            background: rgba(201,168,76,0.25);
            margin: 0 0.3rem;
            flex-shrink: 0;
        }

        .nav-cta {
            background: var(--gold);
            color: var(--dark);
            padding: 0.55rem 1.3rem;
            border: none;
            border-radius: 100px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.82rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s;
            text-decoration: none;
            display: inline-block;
            white-space: nowrap;
            margin-left: 0.4rem;
        }
        .nav-cta:hover {
            background: var(--gold-light);
            transform: translateY(-1px);
            box-shadow: 0 6px 18px rgba(201,168,76,0.35);
        }

        /* Mobile hamburger */
        .nav-hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            padding: 6px;
            background: none;
            border: none;
        }
        .nav-hamburger span {
            display: block;
            width: 22px;
            height: 2px;
            background: var(--text);
            border-radius: 2px;
            transition: all 0.3s;
        }

        .nav-mobile-menu {
            display: none;
            position: fixed;
            top: 58px;
            left: 0; right: 0;
            background: rgba(250,244,232,0.98);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(201,168,76,0.2);
            padding: 1rem 1.5rem 1.5rem;
            z-index: 199;
            flex-direction: column;
            gap: 0.3rem;
        }
        .nav-mobile-menu.open { display: flex; }
        .nav-mobile-menu .nav-link { justify-content: flex-start; padding: 0.7rem 1rem; border-radius: 12px; font-size: 0.9rem; }
        .nav-mobile-menu .nav-cta { margin-left: 0; margin-top: 0.5rem; text-align: center; padding: 0.8rem; }

        /* ══════════════════════════════════
           HERO HEADER
        ══════════════════════════════════ */
        header {
            position: relative;
            background: var(--dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
            padding: 2rem;
        }

        header::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 50% 0%, rgba(201,168,76,0.2) 0%, transparent 70%),
                radial-gradient(ellipse 50% 40% at 80% 100%, rgba(201,168,76,0.1) 0%, transparent 60%);
        }

        .hero-ring {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            border: 1px solid rgba(201,168,76,0.1);
            pointer-events: none;
        }
        .hero-ring:nth-child(1) { width: min(700px,90vw); height: min(700px,90vw); }
        .hero-ring:nth-child(2) { width: min(500px,70vw); height: min(500px,70vw); border-color: rgba(201,168,76,0.07); }

        .header-inner { position: relative; z-index: 2; max-width: 700px; }

        .logo-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(201,168,76,0.12);
            border: 1px solid rgba(201,168,76,0.35);
            border-radius: 100px;
            padding: 0.45rem 1.2rem;
            margin-bottom: 2.5rem;
            animation: fadeDown 0.8s ease forwards;
        }
        .logo-badge span {
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--gold);
        }
        .logo-dot { width: 6px; height: 6px; background: var(--gold); border-radius: 50%; }

        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(3.5rem, 10vw, 7.5rem);
            font-weight: 900;
            color: var(--white);
            line-height: 1.0;
            letter-spacing: -0.02em;
            animation: fadeUp 0.9s 0.2s ease both;
        }
        header h1 span { color: var(--gold); display: block; }

        .header-sub {
            font-size: clamp(1rem, 2vw, 1.15rem);
            color: rgba(255,255,255,0.5);
            font-weight: 300;
            margin-top: 1.2rem;
            letter-spacing: 0.04em;
            line-height: 1.7;
            animation: fadeUp 0.9s 0.4s ease both;
        }

        /* Hero quick links */
        .hero-nav-links {
            margin-top: 2.5rem;
            display: flex;
            gap: 0.6rem;
            justify-content: center;
            flex-wrap: wrap;
            animation: fadeUp 0.9s 0.55s ease both;
        }

        .hero-pill {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            text-decoration: none;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            color: rgba(255,255,255,0.65);
            padding: 0.45rem 1.1rem;
            border-radius: 100px;
            font-size: 0.8rem;
            font-weight: 500;
            transition: all 0.25s;
            letter-spacing: 0.02em;
        }
        .hero-pill:hover {
            background: rgba(201,168,76,0.15);
            border-color: rgba(201,168,76,0.4);
            color: var(--gold);
            transform: translateY(-2px);
        }
        .hero-pill .pill-icon { font-size: 0.85rem; }

        /* Hero CTA buttons */
        .header-cta {
            margin-top: 1.5rem;
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            animation: fadeUp 0.9s 0.7s ease both;
        }

        .btn-primary {
            background: var(--gold);
            color: var(--dark);
            padding: 0.9rem 2.4rem;
            border: none;
            border-radius: 100px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            letter-spacing: 0.02em;
        }
        .btn-primary:hover {
            background: var(--gold-light);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(201,168,76,0.4);
        }

        .btn-outline {
            background: transparent;
            color: rgba(255,255,255,0.7);
            padding: 0.9rem 2.4rem;
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 100px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }
        .btn-outline:hover {
            border-color: var(--gold);
            color: var(--gold);
            transform: translateY(-2px);
        }

        .scroll-hint {
            position: absolute;
            bottom: 2.5rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            animation: fadeUp 1s 1.2s ease both;
        }
        .scroll-hint span { font-size: 0.68rem; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(255,255,255,0.25); }
        .scroll-line { width: 1px; height: 50px; background: linear-gradient(to bottom, rgba(201,168,76,0.6), transparent); animation: scrollPulse 2s infinite; }

        /* ══════════════════════════════════
           STATS BAR
        ══════════════════════════════════ */
        .stats-bar {
            background: var(--dark-mid);
            padding: 1.4rem 2rem;
            display: flex;
            justify-content: center;
            gap: clamp(2rem, 6vw, 5rem);
            flex-wrap: wrap;
            border-bottom: 1px solid rgba(201,168,76,0.12);
        }
        .stat { text-align: center; }
        .stat-num { font-family: 'Playfair Display', serif; font-size: 1.6rem; font-weight: 700; color: var(--gold); }
        .stat-label { font-size: 0.7rem; color: rgba(255,255,255,0.35); letter-spacing: 0.12em; text-transform: uppercase; margin-top: 0.15rem; }

        /* ══════════════════════════════════
           BOOKS SECTION
        ══════════════════════════════════ */
        #books { padding: 6rem 2rem; max-width: 1200px; margin: 0 auto; }

        .section-header { text-align: center; margin-bottom: 4rem; }
        .section-tag {
            display: inline-block;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--gold);
            background: rgba(201,168,76,0.1);
            border: 1px solid rgba(201,168,76,0.25);
            padding: 0.3rem 1rem;
            border-radius: 100px;
            margin-bottom: 1rem;
        }
        .section-title { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 5vw, 3.2rem); font-weight: 700; color: var(--dark); line-height: 1.15; }
        .section-title em { font-style: italic; color: var(--gold); }
        .section-desc { color: var(--text-light); font-size: 1rem; margin-top: 0.8rem; max-width: 480px; margin-left: auto; margin-right: auto; line-height: 1.7; }

        .books-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 2rem; }

        .book-card {
            background: var(--white);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(201,168,76,0.15);
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            opacity: 0;
            transform: translateY(30px);
            animation: fadeUp 0.6s ease forwards;
        }
        .book-card:nth-child(1){animation-delay:.1s}
        .book-card:nth-child(2){animation-delay:.2s}
        .book-card:nth-child(3){animation-delay:.3s}
        .book-card:nth-child(4){animation-delay:.4s}

        .book-card:hover { transform: translateY(-10px); box-shadow: 0 30px 60px rgba(26,18,8,0.15), 0 0 0 1px rgba(201,168,76,0.3); }

        .book-cover { position: relative; height: 280px; overflow: hidden; }
        .book-cover-placeholder { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 3rem; color: var(--white); }
        .cover-1{background:linear-gradient(135deg,#2D1B69 0%,#11998e 100%)}
        .cover-2{background:linear-gradient(135deg,#834d9b 0%,#d04ed6 100%)}
        .cover-3{background:linear-gradient(135deg,#c94b4b 0%,#4b134f 100%)}
        .cover-4{background:linear-gradient(135deg,#1a6b3c 0%,#2d9cdb 100%)}

        .book-badge { position: absolute; top: 1rem; right: 1rem; background: var(--gold); color: var(--dark); font-size: 0.66rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 0.3rem 0.75rem; border-radius: 100px; }

        .book-body { padding: 1.5rem; }
        .book-category { font-size: 0.68rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.5rem; }
        .book-card h3 { font-family: 'Playfair Display', serif; font-size: 1.2rem; font-weight: 700; color: var(--dark); line-height: 1.3; margin-bottom: 0.5rem; }
        .book-desc { font-size: 0.83rem; color: var(--text-light); line-height: 1.6; margin-bottom: 1.2rem; }
        .book-footer { display: flex; align-items: center; justify-content: space-between; }
        .book-price { display: flex; flex-direction: column; }
        .price-label { font-size: 0.66rem; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.08em; }
        .price-value { font-family: 'Playfair Display', serif; font-size: 1.3rem; font-weight: 700; color: var(--dark); }
        .price-currency { font-size: 0.78rem; font-family: 'DM Sans', sans-serif; font-weight: 500; color: var(--text-light); }

        .btn-buy {
            background: var(--dark);
            color: var(--white);
            padding: 0.65rem 1.4rem;
            border: none;
            border-radius: 100px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.84rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }
        .btn-buy:hover { background: var(--gold); color: var(--dark); transform: scale(1.05); }

        /* ══════════════════════════════════
           FEATURES
        ══════════════════════════════════ */
        #features { background: var(--dark); padding: 6rem 2rem; }
        .features-inner { max-width: 1100px; margin: 0 auto; }
        .features-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1.5rem; margin-top: 3rem; }

        .feature-card { padding: 2rem; border: 1px solid rgba(201,168,76,0.15); border-radius: 16px; transition: all 0.3s; }
        .feature-card:hover { border-color: rgba(201,168,76,0.4); background: rgba(201,168,76,0.04); transform: translateY(-4px); }
        .feature-icon { width: 48px; height: 48px; background: rgba(201,168,76,0.12); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; margin-bottom: 1.2rem; }
        .feature-card h4 { font-family: 'Playfair Display', serif; font-size: 1.1rem; color: var(--white); margin-bottom: 0.5rem; }
        .feature-card p { font-size: 0.85rem; color: rgba(255,255,255,0.4); line-height: 1.7; }

        /* Features section title override */
        #features .section-title { color: var(--white); }
        #features .section-desc { color: rgba(255,255,255,0.4); }

        /* ══════════════════════════════════
           QUICK LINKS SECTION
        ══════════════════════════════════ */
        #quick-links {
            background: var(--dark2);
            padding: 4rem 2rem;
            border-top: 1px solid rgba(201,168,76,0.12);
            border-bottom: 1px solid rgba(201,168,76,0.12);
        }
        .quick-links-inner { max-width: 900px; margin: 0 auto; }
        .quick-links-title { font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 700; color: rgba(255,255,255,0.5); text-align: center; letter-spacing: 0.1em; text-transform: uppercase; font-size: 0.72rem; margin-bottom: 2rem; }
        .quick-links-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; }

        .ql-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(201,168,76,0.15);
            border-radius: 16px;
            padding: 1.4rem 1rem;
            transition: all 0.3s;
            text-align: center;
        }
        .ql-card:hover {
            background: rgba(201,168,76,0.08);
            border-color: rgba(201,168,76,0.4);
            transform: translateY(-4px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.3);
        }
        .ql-icon { font-size: 1.6rem; }
        .ql-label { font-size: 0.8rem; font-weight: 600; color: rgba(255,255,255,0.65); letter-spacing: 0.03em; }
        .ql-card:hover .ql-label { color: var(--gold); }

        /* ══════════════════════════════════
           FOOTER
        ══════════════════════════════════ */
        footer { background: var(--dark); border-top: 1px solid rgba(201,168,76,0.12); padding: 3.5rem 2rem 2rem; }
        .footer-inner { max-width: 1100px; margin: 0 auto; display: flex; flex-wrap: wrap; gap: 3rem; justify-content: space-between; align-items: flex-start; }

        .footer-brand h3 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: var(--white); margin-bottom: 0.5rem; }
        .footer-brand h3 em { color: var(--gold); font-style: normal; }
        .footer-brand p { color: rgba(255,255,255,0.35); font-size: 0.87rem; max-width: 220px; line-height: 1.7; margin-top: 0.5rem; }

        .footer-links h5 { font-size: 0.68rem; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--gold); margin-bottom: 1rem; }
        .footer-links ul { list-style: none; display: flex; flex-direction: column; gap: 0.55rem; }
        .footer-links a { text-decoration: none; color: rgba(255,255,255,0.4); font-size: 0.87rem; transition: color 0.2s; display: flex; align-items: center; gap: 0.4rem; }
        .footer-links a:hover { color: var(--gold); }
        .footer-links a::before { content: '→'; font-size: 0.7rem; color: rgba(201,168,76,0.
