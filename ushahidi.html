<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SadeBooks – Ushahidi wa Wateja</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; -webkit-font-smoothing:antialiased; }
  body { background:#e5ddd5; display:flex; justify-content:center; align-items:flex-start; min-height:100vh; padding:20px 0; font-family:'Roboto',sans-serif; }

  .phone { width:390px; max-width:100vw; background:#fff; border-radius:40px; overflow:hidden; box-shadow:0 24px 80px rgba(0,0,0,0.3),0 0 0 1px rgba(0,0,0,0.08); }

  .status-bar { background:#fff; padding:12px 20px 4px; display:flex; justify-content:space-between; align-items:center; }
  .status-bar .time { font-size:15px; font-weight:700; color:#000; }
  .status-icons { display:flex; align-items:center; gap:5px; }
  .sig { display:flex; align-items:flex-end; gap:2px; height:13px; }
  .sig span { width:3px; background:#000; border-radius:1px; display:block; }
  .bat-wrap { display:flex; align-items:center; gap:3px; }
  .bat-pct { font-size:11px; font-weight:700; color:#000; }
  .bat { width:25px; height:13px; border:1.5px solid #000; border-radius:3px; padding:1.5px; display:flex; align-items:center; position:relative; }
  .bat::after { content:''; position:absolute; right:-4px; width:2px; height:6px; background:#000; border-radius:0 1px 1px 0; }
  .bat-fill { width:77%; height:100%; background:#000; border-radius:1px; }

  .wa-header { background:#fff; padding:2px 16px 10px; display:flex; justify-content:space-between; align-items:center; }
  .wa-header h1 { font-size:28px; font-weight:700; color:#075e54; letter-spacing:-0.5px; }
  .wa-icons { display:flex; gap:20px; align-items:center; }
  .wa-icons svg { width:24px; height:24px; fill:#000; }

  .search-bar { padding:4px 12px 10px; background:#fff; }
  .search-inner { background:#f0f2f0; border-radius:24px; display:flex; align-items:center; padding:9px 14px; gap:10px; }
  .search-inner svg { width:18px; height:18px; fill:#777; flex-shrink:0; }
  .search-inner span { font-size:15px; color:#999; }

  .filter-tabs { display:flex; align-items:center; gap:8px; padding:0 12px 12px; overflow-x:auto; scrollbar-width:none; background:#fff; }
  .filter-tabs::-webkit-scrollbar { display:none; }
  .tab { padding:6px 16px; border-radius:20px; font-size:13px; font-weight:500; white-space:nowrap; border:1px solid #e0e0e0; color:#555; flex-shrink:0; }
  .tab.active { background:#d9fdd3; border-color:#b2f0a0; color:#000; font-weight:700; }
  .tab-plus { width:32px; height:32px; border-radius:50%; border:1px solid #ddd; display:flex; align-items:center; justify-content:center; font-size:20px; color:#777; flex-shrink:0; }

  .archived-row { display:flex; align-items:center; gap:12px; padding:10px 16px; border-bottom:1px solid #f0f0f0; }
  .arch-icon { width:52px; height:52px; border-radius:50%; background:#f0f0f0; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .arch-icon svg { width:24px; height:24px; fill:#888; }
  .archived-row span { font-size:16px; color:#555; }

  .cta-banner { background:linear-gradient(135deg,#075e54,#128c7e); padding:10px 14px; display:flex; align-items:center; gap:10px; }
  .cta-banner p { font-size:12px; color:rgba(255,255,255,0.92); flex:1; line-height:1.4; }
  .cta-banner p strong { color:#fff; font-size:13px; }
  .cta-btn { background:#25d366; color:#fff; font-size:11px; font-weight:700; padding:6px 12px; border-radius:20px; text-decoration:none; white-space:nowrap; flex-shrink:0; }

  .chat-list { background:#fff; }
  .chat-item { display:flex; align-items:center; padding:10px 16px; gap:13px; border-bottom:1px solid #f2f2f2; cursor:pointer; opacity:0; transform:translateX(-8px); animation:slideIn 0.3s ease forwards; }
  @keyframes slideIn { to { opacity:1; transform:translateX(0); } }

  .avatar { width:52px; height:52px; border-radius:50%; flex-shrink:0; overflow:hidden; }
  .avatar img { width:100%; height:100%; object-fit:cover; object-position:center top; display:block; }

  /* Fallback avatar with initials */
  .avatar-fb { width:52px; height:52px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:21px; font-weight:700; color:#fff; }

  .chat-body { flex:1; min-width:0; }
  .chat-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:3px; }
  .chat-name { font-size:16px; font-weight:500; color:#111; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:210px; }
  .chat-time { font-size:12px; color:#667781; white-space:nowrap; flex-shrink:0; }
  .chat-time.green { color:#25d366; font-weight:600; }
  .chat-bottom { display:flex; justify-content:space-between; align-items:center; }
  .chat-preview { font-size:14px; color:#667781; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:270px; }
  .badge { background:#25d366; color:#fff; font-size:12px; font-weight:700; min-width:20px; height:20px; border-radius:10px; display:flex; align-items:center; justify-content:center; flex-shrink:0; padding:0 4px; }

  .fab-row { display:flex; justify-content:flex-end; padding:10px 16px 4px; background:#fff; }
  .fab { width:56px; height:56px; background:#25d366; border-radius:50%; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 14px rgba(37,211,102,0.4); }
  .fab svg { width:28px; height:28px; fill:white; }

  .bottom-nav { background:#fff; border-top:1px solid #e8e8e8; display:flex; justify-content:space-around; align-items:center; padding:8px 0 18px; }
  .nav-item { display:flex; flex-direction:column; align-items:center; gap:3px; position:relative; }
  .nav-icon { width:26px; height:26px; display:flex; align-items:center; justify-content:center; }
  .nav-icon svg { width:24px; height:24px; fill:#667781; }
  .nav-item.active .nav-icon svg { fill:#075e54; }
  .nav-label { font-size:11px; font-weight:500; color:#667781; }
  .nav-item.active .nav-label { color:#075e54; font-weight:700; }
  .nav-badge { position:absolute; top:-5px; right:-10px; background:#25d366; color:#fff; font-size:10px; font-weight:700; width:17px; height:17px; border-radius:50%; display:flex; align-items:center; justify-content:center; }
</style>
</head>
<body>
<div class="phone">

  <div class="status-bar">
    <div class="time">14:55</div>
    <div class="status-icons">
      <span style="font-size:11px;font-weight:700;color:#000;margin-right:2px">3G</span>

        <span style="height:10px"></span><span style="height:13px;background:#ccc"></span>

      <div class="bat-wrap">
        <span class="bat-pct">77</span>

  <div class="wa-header">

  <div class="archived-row">

    </div>

  </div>

  <div class="cta-banner">
    <p><strong>📚 SadeBooks</strong> — Vitabu vya PDF kwa Kiswahili. TSh 5,000 tu!</p>
    <a class="cta-btn" href="https://hermansade3-cmd.github.io/sadebooks/" target="_blank">Nunua Sasa</a>
  </div>

  <div class="chat-list" id="chatList"></div>

  <div class="fab-row">
    <div class="fab">
      <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/></svg>
    </div>
  </div>

  <div class="bottom-nav">
    <div class="nav-item active">
      <div class="nav-icon" style="position:relative">
        <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
        <div class="nav-badge">1</div>
      </div>
      <span class="nav-label">Chats</span>
    </div>
    <div class="nav-item">
      <div class="nav-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>
      </div>
      <span class="nav-label">Updates</span>
    </div>
    <div class="nav-item">
      <div class="nav-icon">
        <svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
      </div>
      <span class="nav-label">Communities</span>
    </div>
    <div class="nav-item">
      <div class="nav-icon">
        <svg viewBox="0 0 24 24"><path d="M6.62 10.79a15.05 15.05 0 006.59 6.59l2.2-2.2a1 1 0 011.11-.27c1.12.45 2.33.69 3.58.69.55 0 1 .45 1 1V20c0 .55-.45 1-1 1C10.29 21 3 13.71 3 4.5c0-.55.45-1 1-1H8c.55 0 1 .45 1 1 0 1.25.24 2.45.69 3.57.12.28.05.61-.27.93l-2.8 1.79z"/></svg>
      </div>
      <span class="nav-label">Calls</span>
    </div>
  </div>

</div>

<script>
// Picha za watu Weusi wa Afrika - IDs za moja kwa moja kutoka Unsplash
// Kila ID ni picha iliyothibitishwa ya mtu Mweusi wa Afrika
const contacts = [

    time: "14:17",
    green: true,
    msg: "📚 Kitabu cha Forex kilinisaidia kupata faida!",
    badge: "1",
    // Black African man - Unsplash photo by Ayo Ogunseinde

  },
  {

    time: "14:15",
    msg: "DSE guide imenisaidia kuwekeza hisa 💹",
    // Black African woman - photo by Eye for Ebony
    photo: "https://images.unsplash.com/photo-1531746020798-e6953c6e8e04?w=120&h=120&fit=crop&crop=faces&facepad=4&q=80",
    color: "#4a148c", init: "F"
  },
  {
    name: "Juma Rashid",
    time: "13:49",
    msg: "🎙️ 0:28 — TikTok followers zangu 12K sasa!",
    // Black African young man - photo by Christian Buehner
    photo: "https://images.unsplash.com/photo-1618245318763-a15156d6b23c?w=120&h=120&fit=crop&crop=faces&facepad=4&q=80",
    color: "#1b5e20", init: "J"
  },
  {
    name: "Salma Khamis 🇹🇿",
    time: "13:48",
    msg: "Crypto book — TSh 50K ikawa 87K! 🚀",
    // Black African woman smiling - photo by Eye for Ebony
    photo: "https://images.unsplash.com/photo-1596815064285-45ed8a9c0463?w=120&h=120&fit=crop&crop=faces&facepad=4&q=80",
    color: "#b71c1c", init: "S"
  },
  {
    name: "Emmanuel Lyimo",
    time: "12:40",
    msg: "TSh 5,000 ni bei nzuri kwa elimu hii 👏",
    // Black African man - photo by Omotayo Tajudeen
    photo: "https://images.unsplash.com/photo-1545996124-0501ebae84d0?w=120&h=120&fit=crop&crop=faces&facepad=4&q=80",

  {

    // Black African woman - photo by Thought Catalog
    photo: "https://images.unsplash.com/photo-1523824921871-d6f1a15151f1?w=120&h=120&fit=crop&crop=faces&facepad=4&q=80",
    color: "#e65100", init: "G"
  },
  {

    // Black African man smiling - photo by Jurica Koletic
    photo: "https://images.unsplash.com/photo-1504257432389-52343af06ae3?w=120&h=120&fit=crop&crop=faces&facepad=4&q=80",
    color: "#37474f", init: "B"
  },
  {

    // Black African woman natural hair - photo by Eye for Ebony

  {

    color: "#880e4f", init: "M"
  }
];

const list = document.getElementById('chatList');

contacts.forEach((c, i) => {
  const item = document.createElement('div');
  item.className = 'chat-item';
  item.style.animationDelay = (i * 0.06) + 's';

  const badgeHtml = c.badge ? `<div class="badge">${c.badge}</div>` : '';
  const timeClass = c.green ? 'chat-time green' : 'chat-time';

  item.innerHTML = `
    <div class="avatar" id="av${i}">
      <img src="${c.photo}" alt="${c.init}"
        onload="this.parentNode.style.background='transparent'"
        onerror="
          this.parentNode.innerHTML='<div style=\'width:52px;height:52px;background:${c.color};border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:21px;font-weight:700;color:#fff\'>${c.init}</div>';
        ">
    </div>
    <div class="chat-body">
      <div class="chat-top">
        <span class="chat-name">${c.name}</span>
        <span class="${timeClass}">${c.time}</span>
      </div>
      <div class="chat-bottom">
        <span class="chat-preview">${c.msg}</span>
        ${badgeHtml}
      </div>
    </div>`;

  list.appendChild(item);
});
</script>

</body>
</html>
